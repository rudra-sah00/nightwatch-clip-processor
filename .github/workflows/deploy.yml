name: Deploy Clip Processor

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/rudra-sah00/nightwatch-clip-processor:latest
            docker rm -f nightwatch-clip-processor 2>/dev/null || true
            docker run -d --name nightwatch-clip-processor \
              --restart unless-stopped \
              --network nightwatch_default \
              --env-file /opt/nightwatch/.env \
              -v /tmp/clips:/tmp/clips \
              ghcr.io/rudra-sah00/nightwatch-clip-processor:latest
