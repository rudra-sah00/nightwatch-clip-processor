name: Deploy Clip Processor

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/rudra-sah00/nightwatch-clip-processor:latest
            docker rm -f nightwatch-clip-processor 2>/dev/null || true
            docker run -d --name nightwatch-clip-processor \
              --restart unless-stopped \
              --network nightwatch \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e MINIO_ENDPOINT="${{ secrets.MINIO_ENDPOINT }}" \
              -e MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
              -e MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
              -e MINIO_USE_SSL=true \
              -e MINIO_PORT=443 \
              -e MINIO_CLIPS_BUCKET=nightwatch-clips \
              -e REDIS_URL=redis://nightwatch_redis_prod:6379 \
              -e NODE_ENV=production \
              -v nightwatch_clip_segments_prod:/tmp/clips \
              ghcr.io/rudra-sah00/nightwatch-clip-processor:latest
